<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helped - Hyperlocal</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --container-bg: #ffffff;
            --text: #1e1e1e;
            --muted: #717171;
            --border: rgba(60, 141, 188, 0.2);
            --radius: 28px;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .page {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: transparent;
            color: var(--text);
            font-size: 24px;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .helped-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .month-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .month-header {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--secondary);
        }

        .helped-list {
            display: grid;
            gap: 16px;
        }

        .helped-card {
            background: #ffffff;
            border-radius: var(--radius);
            border: 1px solid rgba(60, 141, 188, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .helped-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .helped-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }

        .person-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .rating-star {
            color: var(--muted);
            font-size: 12px;
        }

        .service-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .timestamp {
            font-size: 12px;
            color: var(--muted);
            margin: 0;
        }

        .footer-nav {
            display: none;
        }

        .log-help-box {
            background: #ffffff;
            border-radius: var(--radius);
            border: 1px solid rgba(60, 141, 188, 0.15);
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        .log-help-box h2 {
            margin: 0 0 16px;
            font-size: 18px;
            color: var(--primary);
        }

        .log-help-grid {
            display: grid;
            gap: 12px;
            max-width: 520px;
        }

        .log-help-grid input,
        .log-help-grid select {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 14px;
            font-family: inherit;
        }

        .log-help-box .save-btn {
            margin-top: 8px;
            padding: 12px 20px;
            border-radius: 999px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            width: fit-content;
        }

        @media (max-width: 1060px) {
            .helped-list {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 780px) {
            .page {
                padding: 24px 18px 32px;
            }

            .header {
                gap: 12px;
                margin-bottom: 24px;
            }

            .month-header {
                font-size: 16px;
            }

            .helped-card {
                padding: 20px;
            }

            .person-name {
                font-size: 15px;
            }

            .service-title {
                font-size: 16px;
            }

            .rating {
                font-size: 12px;
            }

            .helped-container {
                gap: 24px;
            }

            .footer-nav {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
                margin-top: 24px;
            }

            .footer-nav a {
                padding: 14px 0;
                text-align: center;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
                <a href="homeAllPage.html" class="back-btn">←</a>
            <h1 class="header-title">Helped</h1>
        </div>

        <div class="log-help-box">
            <h2>Log help you gave someone</h2>
            <p style="margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5;">This saves to your account in Firestore so your history stays accurate.</p>
            <form id="log-help-form">
                <div class="log-help-grid">
                    <input type="text" id="help-service-title" placeholder="What did you help with? (required)" required>
                    <input type="text" id="help-person-name" placeholder="Neighbor name (optional)">
                    <select id="help-rating" aria-label="Rating">
                        <option value="">Rating (optional)</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>
                    <button type="submit" class="save-btn">Save</button>
                </div>
            </form>
        </div>

        <div class="helped-container">
            <div class="month-section">
                <h2 class="month-header">Help you gave (saved)</h2>
                <div class="helped-list" id="helped-history-list">
                    <p>Loading…</p>
                </div>
            </div>
            <div class="month-section">
                <h2 class="month-header">Your posts</h2>
                <div class="helped-list" id="helped-posts-activity">
                    <p>Loading…</p>
                </div>
            </div>
        </div>

        <div class="footer-nav">
            <a href="homeAllPage.html">Home</a>
            <a href="communityHelperPage.html">Community</a>
            <a href="createPostPage.html">Create</a>
            <a href="messages.html">Chat</a>
            <a href="profilePage.html">Profile</a>
        </div>
    </div>
    <script type="module" src="hyperlocal-backend.js"></script>
</body>

</html>
