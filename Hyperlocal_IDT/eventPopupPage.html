<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Popup</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --container-bg: #ffffff;
            --text: #1e1e1e;
            --muted: #717171;
            --border: rgba(60, 141, 188, 0.1);
            --radius: 20px;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .event-pop-up-page {
            background: var(--container-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .event-header {
            position: relative;
            padding: 20px 24px 16px;
            background: linear-gradient(135deg, var(--secondary), #e3f1fa);
        }

        .event-header-title {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: #ffffff;
            transform: scale(1.1);
        }

        .event-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .event-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            line-height: 1.3;
        }

        .event-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text);
        }

        .detail-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .detail-text {
            font-weight: 500;
            color: var(--text);
        }

        .event-description {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
            margin: 0;
            padding: 12px;
            background: var(--background);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .event-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .join-btn {
            flex: 1;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .join-btn:hover {
            background: #2a6a94;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(60, 141, 188, 0.25);
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .event-pop-up-page {
                max-width: 100%;
            }

            .event-header {
                padding: 16px 18px 14px;
            }

            .event-content {
                padding: 18px;
                gap: 12px;
            }

            .event-title {
                font-size: 16px;
            }

            .detail-item {
                font-size: 12px;
            }

            .event-description {
                font-size: 11px;
                padding: 10px;
            }

            .join-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="event-pop-up-page">
        <div class="event-header">
            <p class="event-header-title">Neighborhood event</p>
            <a href="communityEventPage.html" class="close-btn">✕</a>
        </div>

        <div class="event-content">
            <h2 class="event-title">Neighborhood Clean-Up Drive</h2>

            <div class="event-details">
                <div class="detail-item">
                    <div class="detail-icon">                        
                    </div>
                    <span class="detail-text">Saturday, Nov 16</span>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">                        
                    </div>
                    <span class="detail-text">9:00 AM - 12:00 PM</span>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">
                    </div>
                    <span class="detail-text">Pragatinagar Park</span>
                </div>

                <div class="detail-item">
                    <div class="detail-icon">
                    </div>
                    <span class="detail-text">24 People Attending</span>
                </div>
            </div>

            <p class="event-description">By joining this event you'll receive updates and reminders. You can always cancel your participation later.</p>

            <div class="event-actions">
                <button class="join-btn">Join Event</button>
            </div>
        </div>
    </div>
</body>

</html>
