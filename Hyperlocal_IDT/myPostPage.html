<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Posts - Hyperlocal</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --container-bg: #ffffff;
            --text: #1e1e1e;
            --muted: #717171;
            --border: rgba(60, 141, 188, 0.2);
            --radius: 28px;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .page {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: transparent;
            color: var(--text);
            font-size: 24px;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .month-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .month-header {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--secondary);
        }

        .posts-list {
            display: grid;
            gap: 16px;
        }

        .post-card {
            background: #ffffff;
            border-radius: var(--radius);
            border: 1px solid rgba(60, 141, 188, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .post-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .post-description {
            font-size: 14px;
            color: var(--text);
            line-height: 1.6;
            margin: 0;
        }

        .post-timestamp {
            font-size: 12px;
            color: var(--muted);
            margin: 0;
        }

        .footer-nav {
            display: none;
        }

        @media (max-width: 1060px) {
            .posts-list {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 780px) {
            .page {
                padding: 24px 18px 32px;
            }

            .header {
                gap: 12px;
                margin-bottom: 24px;
            }

            .month-header {
                font-size: 16px;
            }

            .post-card {
                padding: 20px;
            }

            .post-title {
                font-size: 16px;
            }

            .post-description {
                font-size: 13px;
            }

            .posts-container {
                gap: 24px;
            }

            .footer-nav {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
                margin-top: 24px;
            }

            .footer-nav a {
                padding: 14px 0;
                text-align: center;
                font-size: 13px;
            }
        }
    </style>
</head>

<body data-page="my-posts">
    <div class="page">
        <div class="header">

            <a href="homeAllPage.html" class="back-btn">←</a>
            <h1 class="header-title">My Posts</h1>
        </div>

        <div class="posts-container" id="my-posts-container">
            <p style="color:#717171;">Loading your posts…</p>
        </div>

        <div class="footer-nav">
            <a href="homeAllPage.html">Home</a>
            <a href="communityHelperPage.html">Community</a>
            <a href="createPostPage.html">Create</a>
            <a href="messages.html">Chat</a>
            <a href="profilePage.html">Profile</a>
        </div>
    </div>
    <script type="module" src="hyperlocal-ui.js"></script>
</body>

</html>
