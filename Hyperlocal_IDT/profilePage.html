<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Hyperlocal</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --container-bg: #ffffff;
            --text: #1e1e1e;
            --muted: #717171;
            --border: rgba(60, 141, 188, 0.2);
            --radius: 28px;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .page {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            background: transparent;
            color: var(--text);
            font-size: 24px;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .profile-card {
            background: #ffffff;
            border-radius: var(--radius);
            border: 1px solid rgba(60, 141, 188, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
            padding: 32px;
            margin-bottom: 28px;
            text-align: center;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--secondary);
            margin: 0 auto 20px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px;
        }

        .profile-bio {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 24px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .section {
            background: #ffffff;
            border-radius: var(--radius);
            border: 1px solid rgba(60, 141, 188, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
            padding: 28px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 20px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .skill-badge {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--secondary);
            background: #ffffff;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
        }

        .add-skill-btn {
            padding: 8px 14px;
            border-radius: 999px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
        }

        .add-skill-btn:hover {
            background: var(--primary);
            color: #ffffff;
        }

        .achievements-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .achievement {
            padding: 16px;
            border-radius: 16px;
            background: var(--background);
            text-align: center;
        }

        .achievement-name {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 28px;
        }

        .action-btn {
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--primary);
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .action-btn:hover {
            background: var(--secondary);
            color: #ffffff;
            border-color: transparent;
        }

        .action-btn.primary {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
        }

        .action-btn.primary:hover {
            background: #2e6b9a;
        }

        .footer-nav {
            display: none;
        }

        @media (max-width: 1060px) {
            .achievements-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 780px) {
            .page {
                padding: 24px 18px 32px;
            }

            .header {
                gap: 12px;
                margin-bottom: 24px;
            }

            .profile-card {
                padding: 24px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }

            .profile-name {
                font-size: 22px;
            }

            .stats {
                gap: 20px;
            }

            .section {
                padding: 20px;
            }

            .achievements-list {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .footer-nav {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 12px;
                margin-top: 24px;
            }

            .footer-nav a {
                padding: 14px 0;
                text-align: center;
                font-size: 13px;
            }
        }
    </style>
</head>

<body data-page="profile">
    <div class="page">
        <div class="header">
            <a href="homeAllPage.html" class="back-btn">←</a>
            <h1 class="header-title">Profile</h1>
        </div>

        <div class="profile-card">
            <img src="images/user-default.svg" alt="" class="profile-image" id="profile-avatar">
            <h2 class="profile-name" id="profile-display-name">Loading…</h2>
            <p class="profile-bio" id="profile-bio">Loading your profile…</p>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="stat-helps">—</div>
                    <div class="stat-label">Helps / activity</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-rating">—</div>
                    <div class="stat-label">Rating</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3 class="section-title">Skills and Services</h3>
            <div class="skills-list" id="profile-skills">
                <span class="skill-badge" style="opacity:0.7;">Loading…</span>
            </div>
        </div>

        <div class="section">
            <h3 class="section-title">Achievements</h3>
            <div class="achievements-list" id="profile-achievements">
                <div class="achievement">
                    <p class="achievement-name">Loading…</p>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="myPostPage.html" class="action-btn">My Posts</a>
            <a href="helpedPage.html" class="action-btn">Helped</a>
            <button type="button" class="action-btn primary" id="logout-btn">Log out</button>
        </div>

        <div class="footer-nav">
            <a href="homeAllPage.html">Home</a>
            <a href="communityHelperPage.html">Community</a>
            <a href="createPostPage.html">Create</a>
            <a href="messages.html">Chat</a>
            <a href="profilePage.html">Profile</a>
        </div>
    </div>
    <script type="module" src="hyperlocal-ui.js"></script>
</body>

</html>
