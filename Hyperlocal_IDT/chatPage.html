<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Hyperlocal</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --text: #1e1e1e;
            --muted: #717171;
            --border: rgba(60, 141, 188, 0.2);
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .chat-container {
            max-width: 720px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.06);
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .back-btn {
            font-size: 22px;
            padding: 6px 10px;
            border-radius: 12px;
            background: var(--background);
        }

        .chat-user-info {
            flex: 1;
            min-width: 0;
        }

        .chat-user-info h2 {
            margin: 0;
            font-size: 18px;
        }

        .chat-user-info p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .delete-chat-btn {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(220, 53, 69, 0.12);
            color: #c82333;
            font-weight: 600;
            font-size: 13px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--background);
        }

        .msg {
            display: flex;
        }

        .msg-mine {
            justify-content: flex-end;
        }

        .msg-theirs {
            justify-content: flex-start;
        }

        .msg-bubble {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.45;
            word-break: break-word;
        }

        .msg-mine .msg-bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-theirs .msg-bubble {
            background: #fff;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .chat-input-row {
            display: flex;
            gap: 10px;
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            background: #fff;
        }

        .message-input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 15px;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 20px;
            flex-shrink: 0;
        }
    </style>
</head>

<body data-chat-page="chat-room">
    <div class="chat-container">
        <div class="chat-header">
            <a href="messages.html" class="back-btn">←</a>
            <div class="chat-user-info">
                <h2 id="chat-peer-name">Loading…</h2>
                <p id="chat-peer-status">…</p>
            </div>
            <button type="button" class="delete-chat-btn" id="chat-delete-thread">Delete chat</button>
        </div>
        <div class="messages" id="chat-messages">
            <p style="color: #717171; padding: 16px;">Loading messages…</p>
        </div>
        <div class="chat-input-row">
            <input type="text" class="message-input" id="chat-message-input" placeholder="Type a message..." autocomplete="off">
            <button type="button" class="send-btn" id="chat-send-btn" aria-label="Send">→</button>
        </div>
    </div>
    <script type="module" src="hyperlocal-chat.js?v=20260410d"></script>
</body>

</html>
