<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Hyperlocal</title>
    <style>
        :root {
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --text: #ffffff;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--primary);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .title {
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 600;
            margin: 0 0 16px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 48px;
            opacity: 0.9;
        }

        .button {
            background: var(--secondary);
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
            display: inline-block;
            text-decoration: none;
        }

        .button:hover {
            background: #8bb8d8;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .subtitle {
                font-size: 16px;
            }

            .button {
                width: 100%;
                padding: 18px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">HYPERLOCAL</h1>
        <p class="subtitle">Building Stronger Neighborhood Connections</p>
        <a href="signupPage.html" class="button">GET STARTED</a>
    </div>
</body>

</html>
