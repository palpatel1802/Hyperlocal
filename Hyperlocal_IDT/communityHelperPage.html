<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Top helpers</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --text: #1e1e1e;
            --muted: #717171;
            --border: rgba(60, 141, 188, 0.2);
            --radius: 28px;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .back-btn {
            font-size: 24px;
            padding: 8px 12px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid var(--border);
        }

        .header-title {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
        }

        .community-banner {
            background: linear-gradient(135deg, #ffffff, #e8f4fc);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 28px 32px;
            margin-bottom: 28px;
            box-shadow: 0 12px 36px rgba(60, 141, 188, 0.08);
        }

        .community-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .community-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 28px 40px;
        }

        .stat-block {
            min-width: 100px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .community-subnav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
        }

        .community-subnav a {
            padding: 12px 20px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
        }

        .community-subnav a.active {
            background: var(--secondary);
            color: #fff;
            border-color: transparent;
        }

        .helpers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .helper-card {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .helper-rank {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--secondary);
            color: #fff;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .helper-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .helper-info {
            flex: 1;
            min-width: 0;
        }

        .helper-name {
            font-weight: 700;
            font-size: 17px;
            margin-bottom: 4px;
        }

        .helper-badge {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .helper-stats {
            font-size: 14px;
            color: var(--text);
        }

        .load-hint {
            color: var(--muted);
            padding: 8px 0;
        }

        .footer-nav {
            display: none;
        }

        @media (max-width: 780px) {
            .page {
                padding: 24px 18px 32px;
            }

            .footer-nav {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 10px;
                margin-top: 28px;
            }

            .footer-nav a {
                padding: 12px 0;
                text-align: center;
                font-size: 11px;
            }
        }
    </style>
</head>

<body data-page="community-helpers">
    <div class="page">
        <div class="header">
            <a href="homeAllPage.html" class="back-btn">←</a>
            <h1 class="header-title">Community</h1>
        </div>

        <div class="community-banner" id="community-banner">
            <div class="community-title">Neighborhood pulse</div>
            <div class="community-stats">
                <div class="stat-block">
                    <div class="stat-number">—</div>
                    <div class="stat-label">Active neighbors (posts)</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number">—</div>
                    <div class="stat-label">Helps this week</div>
                </div>
                <div class="stat-block">
                    <div class="stat-number">—</div>
                    <div class="stat-label">Avg help rating</div>
                </div>
            </div>
        </div>

        <div class="community-subnav">
            <a class="active" href="communityHelperPage.html">Top helpers</a>
            <a href="communityEventPage.html">Events</a>
            <a href="communityLocalShopPage.html">Local shops</a>
        </div>

        <div class="helpers-grid" id="dynamic-helpers-list">
            <p class="load-hint">Loading from Firestore…</p>
        </div>

        <div class="footer-nav">
            <a href="homeAllPage.html">Home</a>
            <a href="communityHelperPage.html">Community</a>
            <a href="createPostPage.html">Create</a>
            <a href="messages.html">Chat</a>
            <a href="profilePage.html">Profile</a>
        </div>
    </div>
    <script type="module" src="hyperlocal-ui.js"></script>
</body>

</html>
