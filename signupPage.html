<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Hyperlocal</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --text: #1e1e1e;
            --muted: #7d7d7d;
            --border: #1e1e1e;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 32px;
        }

        .title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #4b4b4b;
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 2px solid var(--border);
            background: transparent;
            font-size: 14px;
            color: var(--muted);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input:focus {
            border-bottom-color: var(--primary);
        }

        .password-group {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            right: 0;
            top: 12px;
            width: 17px;
            height: 17px;
            cursor: pointer;
        }

        .button {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 16px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-bottom: 24px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .button:hover {
            background: #2e6b9a;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #000000;
        }

        .divider span {
            padding: 0 16px;
            font-size: 15px;
            color: var(--text);
        }

        .social-login {
            text-align: center;
            margin-bottom: 24px;
        }

        .social-button {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #ffffff;
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .login-link {
            text-align: center;
            font-size: 15px;
            color: var(--text);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }

            .logo {
                font-size: 24px;
            }

            .title {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">HYPERLOCAL</div>
        <h1 class="title">Create your Account</h1>
        
        <form id="signup-form">
            <div class="form-group">
                <label class="label" for="username">User name</label>
                <input class="input" type="text" id="username" placeholder="Enter your user name">
            </div>
            
            <div class="form-group">
                <label class="label" for="email">Email</label>
                <input class="input" type="email" id="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label class="label" for="password">Password</label>
                <div class="password-group">
                    <input class="input" type="password" id="password" placeholder="Enter your password">
                </div>
            </div>
            
            <button type="submit" class="button">SIGN-UP</button>
        </form>
        
        <div class="login-link">
            Already have account <a href="loginPage.html">Login here</a>
        </div>
    </div>
    <script type="module" src="hyperlocal-backend.js"></script>
</body>

</html>
