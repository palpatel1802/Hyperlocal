<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Local Shop - Hyperlocal</title>
    <style>
        :root {
            --background: #f8fafc;
            --primary: #3c8dbc;
            --secondary: #a7d3f0;
            --text: #1e1e1e;
            --muted: #7d7d7d;
            --border: #1e1e1e;
            --container-bg: #f4f8ff;
            font-family: "Nunito Sans", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 32px;
            padding-top: 16px;
        }

        .back-btn {
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #ffffff;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input:focus {
            border-color: var(--primary);
        }

        .textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #ffffff;
            font-size: 14px;
            color: var(--text);
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s ease;
        }

        .textarea:focus {
            border-color: var(--primary);
        }

        .select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #ffffff;
            font-size: 14px;
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .select:focus {
            border-color: var(--primary);
        }

        .file-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-input {
            display: none;
        }

        .file-button {
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: #ffffff;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .file-button:hover {
            border-color: var(--primary);
        }

        .file-name {
            font-size: 14px;
            color: var(--muted);
            flex: 1;
        }

        .button {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            padding: 16px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 32px;
        }

        .button:hover {
            background: #2e6b9a;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .header {
                margin-bottom: 24px;
            }

            .container {
                padding: 24px;
            }

            .logo {
                font-size: 24px;
            }

            .header-title {
                font-size: 18px;
            }

            .file-group {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="createPostPage.html" class="back-btn">←</a>
        <h1 class="header-title">Share Local Shop</h1>
    </div>

    <div class="container">
        <div class="logo">HYPERLOCAL</div>
        
        <form id="share-local-shop-form">
            <div class="form-group">
                <label class="label" for="shop-name">Shop Name</label>
                <input class="input" type="text" id="shop-name" placeholder="Enter shop name">
            </div>
            
            <div class="form-group">
                <label class="label" for="description">Description</label>
                <textarea class="textarea" id="description" placeholder="Describe the shop, its services, and specialty..."></textarea>
            </div>
            
            <div class="form-group">
                <label class="label" for="category">Category</label>
                <select class="select" id="category">
                    <option value="">Select a category</option>
                    <option value="cafe">Cafe</option>
                    <option value="restaurant">Restaurant</option>
                    <option value="retail">Retail Shop</option>
                    <option value="services">Services</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="label" for="availability">Availability</label>
                <select class="select" id="availability">
                    <option value="">Select availability</option>
                    <option value="9am-6pm">9 AM - 6 PM</option>
                    <option value="24hrs">24 Hours</option>
                    <option value="seasonal">Seasonal</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="label" for="location">Location</label>
                <input class="input" type="text" id="location" placeholder="Enter shop location/address">
            </div>
            
            <div class="form-group">
                <label class="label" for="photo">Upload Photo</label>
                <div class="file-group">
                    <button class="file-button" type="button" onclick="document.getElementById('photo').click()">Choose File</button>
                    <span class="file-name">No file chosen</span>
                </div>
                <input class="file-input" type="file" id="photo" accept="image/*">
            </div>
            
            <button type="submit" class="button">POST</button>
        </form>
    </div>
    <script type="module" src="hyperlocal-backend.js"></script>
</body>

</html>
